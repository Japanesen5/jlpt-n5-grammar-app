<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>JLPT N5 文法 第一章</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f5fb;
      color: #222;
    }
    #app { display: flex; min-height: 100vh; }
    .sidebar {
      width: 260px;
      background: #111827;
      color: #e5e7eb;
      padding: 20px;
    }
    .sidebar h1 { font-size: 20px; margin: 0 0 16px; }
    .chapter-button {
      width: 100%; margin-bottom: 8px; padding: 10px 12px;
      border-radius: 8px; border: none; text-align: left;
      background: #1f2937; color: #e5e7eb; cursor: pointer; font-size: 14px;
    }
    .chapter-button.active, .chapter-button:hover { background: #4f46e5; }
    .main { flex: 1; padding: 20px 24px; }
    .main-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    #chapter-title { margin: 0; font-size: 22px; }
    .view-switch { display: flex; gap: 8px; }
    .view-button {
      padding: 8px 12px; border-radius: 999px;
      border: 1px solid #d1d5db; background: white;
      cursor: pointer; font-size: 13px;
    }
    .view-button.active {
      background: #4f46e5; color: white; border-color: #4f46e5;
    }
    .panel {
      display: none; background: white; border-radius: 12px;
      padding: 16px 18px; box-shadow: 0 4px 8px rgba(0,0,0,0.03);
    }
    .panel.active { display: block; }
    .grammar-point {
      margin-bottom: 16px; padding-bottom: 12px;
      border-bottom: 1px solid #e5e7eb;
    }
    .grammar-title { font-weight: 600; margin-bottom: 4px; }
    .grammar-explain { font-size: 14px; color: #4b5563; margin-bottom: 6px; }
    .example-list { margin: 0; padding-left: 18px; font-size: 14px; }
    .example-ja { font-weight: 500; }
    .example-zh { color: #4b5563; }
    .quiz-question {
      margin-bottom: 16px; padding-bottom: 12px;
      border-bottom: 1px solid #e5e7eb;
    }
    .quiz-question p { margin: 0 0 8px; }
    .options { margin-bottom: 8px; }
    .option-label { display: block; margin-bottom: 4px; font-size: 14px; }
    input[type="text"] {
      width: 100%; padding: 6px 8px; border-radius: 6px;
      border: 1px solid #d1d5db; font-size: 14px;
    }
    #submit-quiz {
      margin-top: 8px; padding: 10px 14px; border-radius: 999px;
      border: none; background: #4f46e5; color: white;
      font-size: 14px; cursor: pointer;
    }
    #quiz-result {
      margin-top: 14px; padding-top: 10px;
      border-top: 1px solid #e5e7eb; font-size: 14px;
    }
    .wrong-detail {
      margin-top: 6px; padding: 6px 8px; background: #fef2f2;
      border-radius: 6px; border: 1px solid #fecaca;
    }
  </style>
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <h1>JLPT N5 文法</h1>
      <div id="chapter-list"></div>
    </aside>
    <main class="main">
      <header class="main-header">
        <h2 id="chapter-title"></h2>
        <div class="view-switch">
          <button id="lesson-view-btn" class="view-button active">課文 Lesson</button>
          <button id="quiz-view-btn" class="view-button">測驗 Quiz</button>
        </div>
      </header>
      <section id="lesson-view" class="panel active"></section>
      <section id="quiz-view" class="panel"></section>
    </main>
  </div>

  <script>
    const chapters = [
      {
        title: '第一章：名詞句（～です／じゃありません）＋ は・も・の',
                      lessons: [
          {
            title: '文法 1：名詞＋です（肯定句）',
            explain: '「です」用嚟表示「係……」，係禮貌形。結構：名詞 ＋ です。',
            examples: [
              {
                rubyHtml: '<ruby>私<rt>わたし</rt></ruby>は学生です。',
                zh: '我係學生。'
              },
              {
                rubyHtml: '<ruby>彼<rt>かれ</rt></ruby>は<ruby>日本人<rt>にほんじん</rt></ruby>です。',
                zh: '佢係日本人。'
              },
              {
                rubyHtml: 'ここは<ruby>図書館<rt>としょかん</rt></ruby>です。',
                zh: '呢度係圖書館。'
              }
            ]
          },
          {
            title: '文法 2：名詞＋じゃありません（否定句）',
            explain: '「じゃありません」係「唔係……」嘅禮貌否定形。結構：名詞 ＋ じゃありません。',
            examples: [
              {
                rubyHtml: '<ruby>私<rt>わたし</rt></ruby>は<ruby>先生<rt>せんせい</rt></ruby>じゃありません。',
                zh: '我唔係老師。'
              },
              {
                rubyHtml: 'ここは<ruby>学校<rt>がっこう</rt></ruby>じゃありません。',
                zh: '呢度唔係學校。'
              }
            ]
          },
          {
            title: '文法 3：助詞「は」—— 主題標記（「至於……」）',
            explain: '放喺名詞後面，標記主題，相當於「至於……」呢個話題。',
            examples: [
              {
                rubyHtml: '<ruby>私<rt>わたし</rt></ruby>は<ruby>香港人<rt>ほんこんじん</rt></ruby>です。',
                zh: '至於我，就係香港人。'
              },
              {
                rubyHtml: '<ruby>この人<rt>このひと</rt></ruby>は<ruby>田中<rt>たなか</rt></ruby>さんです。',
                zh: '呢個人係田中先生。'
              }
            ]
          },
          {
            title: '文法 4：助詞「も」——「都……」',
            explain: '放喺名詞後面，表示「都、一樣」。',
            examples: [
              {
                rubyHtml: '<ruby>私<rt>わたし</rt></ruby>も学生です。',
                zh: '我都係學生。'
              },
              {
                rubyHtml: '<ruby>彼<rt>かれ</rt></ruby>も<ruby>香港人<rt>ほんこんじん</rt></ruby>です。',
                zh: '佢都係香港人。'
              }
            ]
          },
          {
            title: '文法 5：助詞「の」——「嘅／屬於」',
            explain: '連接兩個名詞，表示前面個名詞屬於後面個名詞，即係「X の Y」＝「X 嘅 Y」。',
            examples: [
              {
                rubyHtml: '<ruby>私<rt>わたし</rt></ruby>の<ruby>名前<rt>なまえ</rt></ruby>',
                zh: '我嘅名。'
              },
              {
                rubyHtml: '<ruby>田中<rt>たなか</rt></ruby>さんの<ruby>本<rt>ほん</rt></ruby>です。',
                zh: '係田中先生嘅書。'
              }
            ]
          }
        ],
        quiz: [
          {
            type: 'mc',
            question: '「我係學生。」用日文應該點寫？',
            options: ['私は先生です。', '私は学生です。', '私は日本人です。'],
            answer: '私は学生です。',
            explanation: '呢句想講「我係學生」，用「学生です」就啱，唔係先生、日本人。'
          },
          {
            type: 'mc',
            question: '「我唔係老師。」用日文應該點寫？',
            options: ['私は先生です。', '私は先生じゃありません。', '私は学生じゃありません。'],
            answer: '私は先生じゃありません。',
            explanation: '用「じゃありません」表示否定，「先生じゃありません」＝唔係老師。'
          },
          {
            type: 'mc',
            question: '邊一句用咗助詞「は」做主題？',
            options: ['私は学生です。', '私の学生です。', '学生も私です。'],
            answer: '私は学生です。',
            explanation: '「私は学生です。」入面，「は」標記主題「我」。'
          },
          {
            type: 'mc',
            question: '「佢都係學生。」應該用邊句？',
            options: ['彼は学生です。', '彼も学生です。', '彼の学生です。'],
            answer: '彼も学生です。',
            explanation: '「も」有「都」嘅意思，「彼も学生です。」＝佢都係學生。'
          },
          {
            type: 'mc',
            question: '「田中先生嘅書。」日文應該點寫？',
            options: ['田中さんは本です。', '田中さんも本です。', '田中さんの本です。'],
            answer: '田中さんの本です。',
            explanation: '「の」用嚟表示「嘅」，「田中さんの本」＝田中先生嘅書。'
          },
          {
            type: 'mc',
            question: '「呢度唔係學校。」日文應該點寫？',
            options: ['ここは学校です。', 'ここは学校じゃありません。', 'ここも学校です。'],
            answer: 'ここは学校じゃありません。',
            explanation: '「じゃありません」否定，「唔係學校」。'
          },
          {
            type: 'input',
            question: '請用「です」完成句子：「我係香港人。」（請輸入完整日文句子）',
            answer: ['私は香港人です。', '私はホンコン人です。'],
            explanation: '主題「我」＋「香港人」＋「です」。'
          },
          {
            type: 'input',
            question: '請用「じゃありません」寫出：「我唔係學生。」',
            answer: ['私は学生じゃありません。'],
            explanation: '用「じゃありません」否定名詞句。'
          },
          {
            type: 'input',
            question: '請用「も」寫出：「我都係學生。」',
            answer: ['私も学生です。'],
            explanation: '「も」表示「都」，指我同其他人一樣係學生。'
          },
          {
            type: 'input',
            question: '請用「の」寫出：「我嘅名字。」（名詞結構，不一定要完整句）',
            answer: ['私の名前'],
            explanation: '「私の」＝我嘅。'
          },
          {
            type: 'input',
            question: '請用「は」寫出一句：「至於呢個人，係老師。」',
            answer: ['この人は先生です。'],
            explanation: '「は」標記主題「呢個人」。'
          },
          {
            type: 'input',
            question: '請寫一句自我介紹，內容要包括「你係學生」。',
            answer: ['私は学生です。'],
            explanation: '只要包含「私は学生です。」呢個結構就可以視為正確。'
          }
        ]
      },
  {
    title: '第二章：動詞ます形（現在・否定）',
        lessons: [
      {
        title: '文法 1：動詞ます形（現在肯定）',
        explain: '動詞字典形（例如「たべる」「いく」）變成ます形，用嚟表示「而家經常／習慣做」某件事，禮貌形結尾。',
        examples: [
          {
            rubyHtml: '毎日<ruby>日本語<rt>にほんご</rt></ruby>を<ruby>勉強<rt>べんきょう</rt></ruby>します。',
            zh: '每日學日文。'
          },
          {
            rubyHtml: '<ruby>朝<rt>あさ</rt></ruby>ごはんを<ruby>食<rt>た</rt></ruby>べます。',
            zh: '食早餐。'
          },
          {
            rubyHtml: '<ruby>会社<rt>かいしゃ</rt></ruby>へ<ruby>行<rt>い</rt></ruby>きます。',
            zh: '去公司返工。'
          }
        ]
      },
      {
        title: '文法 2：動詞ません形（現在否定）',
        explain: '「ません」係ます形嘅否定，表示「唔會／唔通常做」。',
        examples: [
          {
            rubyHtml: '<ruby>肉<rt>にく</rt></ruby>を<ruby>食<rt>た</rt></ruby>べません。',
            zh: '唔食肉。'
          },
          {
            rubyHtml: '<ruby>今日<rt>きょう</rt></ruby>は<ruby>仕事<rt>しごと</rt></ruby>をしません。',
            zh: '今日唔做嘢（唔返工／唔工作）。'
          },
          {
            rubyHtml: 'お<ruby>酒<rt>さけ</rt></ruby>を<ruby>飲<rt>の</rt></ruby>みません。',
            zh: '唔飲酒。'
          }
        ]
      },
      {
        title: '文法 3：時間副詞 + ます',
        explain: '配合「毎日／よく／ときどき／あまり～ません」等時間副詞，描述習慣頻率。',
        examples: [
          {
            rubyHtml: 'よく<ruby>映画<rt>えいが</rt></ruby>を<ruby>見<rt>み</rt></ruby>ます。',
            zh: '好經常睇戲。'
          },
          {
            rubyHtml: 'ときどきゲームをします。',
            zh: '有時打機。'
          },
          {
            rubyHtml: 'あまりテレビを<ruby>見<rt>み</rt></ruby>ません。',
            zh: '唔太睇電視。'
          }
        ]
      }
    ],
    quiz: [
      {
        type: 'mc',
        question: '「我每日學日文。」用日文應該點寫？',
        options: [
          '毎日日本語を勉強します。',
          '毎日日本語を勉強しません。',
          '日本語を勉強でした。'
        ],
        answer: '毎日日本語を勉強します。',
        explanation: '描述習慣動作，用現在肯定「勉強します」。'
      },
      {
        type: 'mc',
        question: '「我唔飲酒。」最自然嘅表達係邊句？',
        options: [
          'お酒を飲みます。',
          'お酒を飲みません。',
          'お酒を飲みでした。'
        ],
        answer: 'お酒を飲みません。',
        explanation: '否定用「ません」，「飲みません」＝唔飲。'
      },
      {
        type: 'mc',
        question: '邊一句包含「時間副詞 + ます形」？',
        options: [
          '映画を見ます。',
          'よく映画を見ます。',
          '映画を見ませんでした。'
        ],
        answer: 'よく映画を見ます。',
        explanation: '「よく」＋「見ます」描述經常做嘅動作。'
      },
      {
        type: 'mc',
        question: '想講「我唔太睇電視。」應該點寫？',
        options: [
          'あまりテレビを見ません。',
          'ときどきテレビを見ます。',
          'よくテレビを見ます。'
        ],
        answer: 'あまりテレビを見ません。',
        explanation: '「あまり～ません」＝唔太……。'
      },
      {
        type: 'input',
        question: '請用ます形寫出：「我去公司返工。」（提示：去＝行く）',
        answer: ['会社へ行きます。'],
        explanation: '「行く」變ます形「行きます」，表達習慣／日常。'
      },
      {
        type: 'input',
        question: '請用ません形寫出：「我唔食肉。」',
        answer: ['肉を食べません。'],
        explanation: '「食べる」變否定「食べません」。'
      },
      {
        type: 'input',
        question: '請用「よく」造句：「我好經常打機。」（用ゲーム）',
        answer: ['よくゲームをします。'],
        explanation: '「よく」＋「します」表示好經常做。'
      },
      {
        type: 'input',
        question: '請用「ときどき」造句：「我有時睇戲。」',
        answer: ['ときどき映画を見ます。'],
        explanation: '「ときどき」＋「見ます」表示偶爾。'
      }
    ]
  }
];
    
    const chapterTitleEl = document.getElementById('chapter-title');
    const lessonViewEl = document.getElementById('lesson-view');
    const quizViewEl = document.getElementById('quiz-view');
    const lessonViewBtn = document.getElementById('lesson-view-btn');
    const quizViewBtn = document.getElementById('quiz-view-btn');
       const chapterListEl = document.getElementById('chapter-list');
       let currentChapterIndex = 0;


               function renderLesson(chapter) {
      chapterTitleEl.textContent = chapter.title;
      lessonViewEl.innerHTML = '';
      chapter.lessons.forEach(point => {
        const div = document.createElement('div');
        div.className = 'grammar-point';
        const title = document.createElement('div');
        title.className = 'grammar-title';
        title.textContent = point.title;
        const explain = document.createElement('div');
        explain.className = 'grammar-explain';
        explain.textContent = point.explain;
        const ul = document.createElement('ul');
        ul.className = 'example-list';
        point.examples.forEach(ex => {
          const li = document.createElement('li');
          const ja = document.createElement('div');
          ja.className = 'example-ja';

          if (ex.rubyHtml) {
            // 已經準備好整句 ruby HTML
            ja.innerHTML = ex.rubyHtml;
          } else if (ex.kanji && ex.kana) {
            // 後備：單一漢字＋假名
            ja.innerHTML = `<ruby>${ex.kanji}<rt>${ex.kana}</rt></ruby>${ex.tail || ''}`;
          } else {
            // 純文字
            ja.textContent = ex.ja;
          }

          const zh = document.createElement('div');
          zh.className = 'example-zh';
          zh.textContent = '→ ' + ex.zh;

          li.appendChild(ja);
          li.appendChild(zh);
          ul.appendChild(li);
        });
        div.appendChild(title);
        div.appendChild(explain);
        div.appendChild(ul);
        lessonViewEl.appendChild(div);
      });
    }

    function renderQuiz(chapter) {
      quizViewEl.innerHTML = '';
      chapter.quiz.forEach((q, index) => {
        const div = document.createElement('div');
        div.className = 'quiz-question';
        const p = document.createElement('p');
        p.textContent = `Q${index + 1}. ${q.question}`;
        div.appendChild(p);
        if (q.type === 'mc') {
          const optionsDiv = document.createElement('div');
          optionsDiv.className = 'options';
          q.options.forEach(opt => {
            const label = document.createElement('label');
            label.className = 'option-label';
            const input = document.createElement('input');
            input.type = 'radio';
            input.name = `q${index}`;
            input.value = opt;
            label.appendChild(input);
            label.appendChild(document.createTextNode(' ' + opt));
            optionsDiv.appendChild(label);
          });
          div.appendChild(optionsDiv);
        } else {
          const input = document.createElement('input');
          input.type = 'text';
          input.name = `q${index}`;
          input.placeholder = '輸入答案（可以用日文）';
          div.appendChild(input);
        }
        quizViewEl.appendChild(div);
      });
      const submitBtn = document.createElement('button');
      submitBtn.id = 'submit-quiz';
      submitBtn.textContent = '交卷並查看結果';
      submitBtn.onclick = () => gradeQuiz(chapter);
      const resultDiv = document.createElement('div');
      resultDiv.id = 'quiz-result';
      quizViewEl.appendChild(submitBtn);
      quizViewEl.appendChild(resultDiv);
    }

    function gradeQuiz(chapter) {
      let score = 0;
      const total = chapter.quiz.length;
      const wrong = [];
      chapter.quiz.forEach((q, index) => {
        if (q.type === 'mc') {
          const selected = document.querySelector(`input[name="q${index}"]:checked`);
          const value = selected ? selected.value : '';
          if (value === q.answer) score++;
          else wrong.push({ index, user: value || '（未作答）', q });
        } else {
          const input = document.querySelector(`input[name="q${index}"]`);
          const value = (input.value || '').trim();
          const answers = Array.isArray(q.answer) ? q.answer : [q.answer];
          const ok = answers.some(a => a === value);
          if (ok) score++;
          else wrong.push({ index, user: value || '（未作答）', q });
        }
      });
      const resultDiv = document.getElementById('quiz-result');
      resultDiv.innerHTML = '';
      const summary = document.createElement('div');
      summary.textContent = `分數：${score} / ${total}`;
      resultDiv.appendChild(summary);
      if (wrong.length > 0) {
        wrong.forEach(item => {
          const wd = document.createElement('div');
          wd.className = 'wrong-detail';
          wd.innerHTML = `
            Q${item.index + 1} 回答：${item.user}<br>
            正確答案：${Array.isArray(item.q.answer) ? item.q.answer.join(' ／ ') : item.q.answer}<br>
            解釋：${item.q.explanation}
          `;
          resultDiv.appendChild(wd);
        });
      } else {
        const ok = document.createElement('div');
        ok.textContent = '全部答啱！好犀利！';
        resultDiv.appendChild(ok);
      }
    }

    function switchView(view) {
      if (view === 'lesson') {
        lessonViewEl.classList.add('active');
        quizViewEl.classList.remove('active');
        lessonViewBtn.classList.add('active');
        quizViewBtn.classList.remove('active');
      } else {
        lessonViewEl.classList.remove('active');
        quizViewEl.classList.add('active');
        lessonViewBtn.classList.remove('active');
        quizViewBtn.classList.add('active');
      }
    }

    lessonViewBtn.onclick = () => switchView('lesson');
    quizViewBtn.onclick = () => switchView('quiz');

    function renderChapterButtons() {
  chapterListEl.innerHTML = '';
  chapters.forEach((ch, idx) => {
    const btn = document.createElement('button');
    btn.className = 'chapter-button' + (idx === currentChapterIndex ? ' active' : '');
    btn.innerHTML = ch.title.replace('：', '<br>');
    btn.onclick = () => {
      currentChapterIndex = idx;
      renderLesson(chapters[currentChapterIndex]);
      renderQuiz(chapters[currentChapterIndex]);
      updateActiveChapterButton();
      switchView('lesson');
    };
    chapterListEl.appendChild(btn);
  });
}

function updateActiveChapterButton() {
  const buttons = chapterListEl.querySelectorAll('.chapter-button');
  buttons.forEach((b, i) => {
    if (i === currentChapterIndex) b.classList.add('active');
    else b.classList.remove('active');
  });
}

// 初始載入
renderChapterButtons();
renderLesson(chapters[currentChapterIndex]);
renderQuiz(chapters[currentChapterIndex]);
switchView('lesson');
  </script>
</body>
</html>

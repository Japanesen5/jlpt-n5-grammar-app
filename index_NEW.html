<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8" />
<title>JLPT N5 App - 五十音 + N5</title>
<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#f9fafb;
  color:#111827;
}
#app{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:stretch;
}
.app-shell{
  width:100%;
  max-width:1100px;
  margin:24px;
  background:#ffffff;
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 18px 40px rgba(15,23,42,.12);
  display:flex;
}
/* sidebar */
.sidebar{
  width:260px;
  background:#fff7e6;
  color:#78350f;
  padding:20px 18px;
  display:flex;
  flex-direction:column;
  gap:14px;
  border-right:1px solid #fed7aa;
}
.sidebar-logo{
  font-size:22px;
  font-weight:700;
  letter-spacing:.04em;
}
.sidebar-sub{
  font-size:12px;
  color:#9a3412;
  margin-top:4px;
}
.home-mode-buttons{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.home-mode-btn{
  width:100%;
  padding:10px 12px;
  border-radius:999px;
  border:1px solid #fed7aa;
  background:#fff;
  color:#92400e;
  text-align:left;
  cursor:pointer;
  font-size:13px;
  display:flex;
  flex-direction:column;
  transition:.15s all ease-in-out;
}
.home-mode-btn span.title{
  font-size:14px;
  font-weight:600;
}
.home-mode-btn span.desc{
  font-size:11px;
  color:#a16207;
}
.home-mode-btn:hover{
  background:#fef3c7;
}
.home-mode-btn.active{
  background:#facc15;
  border-color:#eab308;
  color:#78350f;
}
.sidebar-section-title{
  margin-top:8px;
  font-size:12px;
  color:#9a3412;
}
#chapter-list{margin-top:4px;}
.chapter-button{
  width:100%;
  margin-bottom:6px;
  padding:8px 10px;
  border-radius:10px;
  border:none;
  text-align:left;
  background:transparent;
  color:#92400e;
  cursor:pointer;
  font-size:13px;
  transition:.15s all ease-in-out;
}
.chapter-button span.main{
  display:block;
  font-weight:500;
}
.chapter-button span.sub{
  display:block;
  font-size:11px;
  color:#a16207;
}
.chapter-button:hover{
  background:#fef3c7;
}
.chapter-button.active{
  background:#facc15;
  color:#78350f;
}
/* main */
.main-area{
  flex:1;
  background:#f9fafb;
  padding:20px 24px;
}
.header-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
  gap:8px;
}
.header-title{
  font-size:16px;
  font-weight:600;
  color:#92400e;
}
.lang-select{
  padding:4px 8px;
  border-radius:999px;
  border:1px solid #e5e7eb;
  background:#ffffff;
  color:#374151;
  font-size:12px;
}
/* home */
.main-home{display:none;}
.main-home.active{display:block;}
.home-title{
  font-size:26px;
  margin:0 0 6px;
  color:#111827;
}
.home-subtitle{
  font-size:14px;
  color:#4b5563;
  margin-bottom:18px;
}
.home-cards{
  display:flex;
  flex-wrap:wrap;
  gap:16px;
}
.home-card{
  flex:1;
  min-width:220px;
  background:#ffffff;
  border-radius:18px;
  padding:16px 18px;
  box-shadow:0 10px 30px rgba(15,23,42,.06);
  cursor:pointer;
  border:1px solid #fde68a;
  transition:.15s all ease-in-out;
}
.home-card:hover{
  box-shadow:0 12px 32px rgba(15,23,42,.09);
  border-color:#fbbf24;
}
.home-card-title{
  font-size:18px;
  margin-bottom:4px;
  color:#92400e;
}
.home-card-tag{
  display:inline-block;
  padding:2px 8px;
  border-radius:999px;
  font-size:11px;
  background:#fef3c7;
  color:#92400e;
  margin-bottom:8px;
}
.home-card-text{
  font-size:13px;
  color:#4b5563;
}
/* study header */
.study-header{
  display:none;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
  flex-wrap:wrap;
}
.study-header-left{
  display:flex;
  flex-direction:column;
  gap:2px;
}
#study-mode-label{
  font-size:11px;
  color:#9ca3af;
  letter-spacing:.12em;
  text-transform:uppercase;
}
#chapter-title{
  margin:0;
  font-size:20px;
  color:#111827;
}
.study-header-right{
  display:flex;
  align-items:center;
  gap:10px;
}
.kana-tabs{
  display:flex;
  gap:8px;
}
.kana-tab-btn{
  padding:6px 10px;
  border-radius:999px;
  border:1px solid #e5e7eb;
  background:#ffffff;
  color:#374151;
  cursor:pointer;
  font-size:12px;
}
.kana-tab-btn.active{
  background:#facc15;
  border-color:#eab308;
  color:#78350f;
}
.view-switch{
  display:flex;
  gap:8px;
}
.view-button{
  padding:6px 10px;
  border-radius:999px;
  border:1px solid #e5e7eb;
  background:#ffffff;
  color:#374151;
  cursor:pointer;
  font-size:12px;
}
.view-button.active{
  background:#111827;
  color:#f9fafb;
  border-color:#111827;
}
/* panels */
.panel{
  display:none;
  background:#ffffff;
  border-radius:16px;
  padding:16px 18px;
  box-shadow:0 12px 30px rgba(15,23,42,.06);
  border:1px solid #e5e7eb;
}
.panel.active{display:block;}
/* grammar + examples */
.grammar-point{
  margin-bottom:20px;
  padding-bottom:14px;
  border-bottom:1px solid #e5e7eb;
}
.grammar-title{
  font-weight:600;
  margin-bottom:4px;
  color:#111827;
}
.grammar-explain{
  font-size:14px;
  color:#4b5563;
  margin-bottom:6px;
}
.example-list{
  margin:0;
  padding-left:18px;
  font-size:14px;
}
.example-ja{font-weight:500;}
.example-zh{color:#6b7280;}
/* kana table */
.kana-table{
  width:100%;
  border-collapse:collapse;
  margin-top:8px;
  font-size:14px;
}
.kana-table th,
.kana-table td{
  border:1px solid #e5e7eb;
  padding:4px 6px;
  vertical-align:top;
}
.kana-table th{
  background:#fef3c7;
  font-weight:600;
  color:#92400e;
}
.kana-table td{background:#ffffff;}
.kana-consonant{
  width:56px;
  text-align:center;
  font-weight:600;
}
.kana-vowel-header{
  text-align:center;
  font-weight:500;
}
.kana-row-cells{
  display:flex;
  gap:6px;
}
.kana-cell{
  flex:1;
  text-align:center;
  padding:2px 0;
}
.kana-char{
  font-size:18px;
  display:block;
}
.kana-roma{
  font-size:11px;
  color:#6b7280;
  display:block;
}
/* vocab (N5 單字風格) */
.vocab-section-title{
  margin:0 0 4px;
  font-size:15px;
  font-weight:600;
  color:#92400e;
}
.vocab-section-bar{
  margin-top:8px;
  background:#fef3c7;
  border-left:4px solid #facc15;
  padding:6px 8px;
  border-radius:6px;
}
.vocab-section-desc{
  font-size:13px;
  color:#6b7280;
}
.vocab-table{
  width:100%;
  border-collapse:collapse;
  margin-top:4px;
  font-size:14px;
}
.vocab-table th,
.vocab-table td{
  border:1px solid #e5e7eb;
  padding:4px 6px;
}
.vocab-table th{
  background:#fef9c3;
  font-weight:600;
  color:#92400e;
}
.vocab-table td{background:#ffffff;}
/* quiz */
.quiz-question{
  margin-bottom:16px;
  padding-bottom:12px;
  border-bottom:1px solid #e5e7eb;
}
.quiz-question p{margin:0 0 8px;}
.options{margin-bottom:8px;}
.option-label{
  display:block;
  margin-bottom:4px;
  font-size:14px;
}
input[type="text"]{
  width:100%;
  padding:6px 8px;
  border-radius:6px;
  border:1px solid #d1d5db;
  font-size:14px;
  background:#ffffff;
  color:#111827;
}
#submit-quiz{
  margin-top:8px;
  padding:8px 12px;
  border-radius:999px;
  border:none;
  background:#facc15;
  color:#78350f;
  font-size:14px;
  cursor:pointer;
}
#submit-quiz:hover{
  background:#eab308;
}
#quiz-result{
  margin-top:14px;
  padding-top:10px;
  border-top:1px solid #e5e7eb;
  font-size:14px;
}
.wrong-detail{
  margin-top:6px;
  padding:6px 8px;
  background:#fef2f2;
  border-radius:6px;
  border:1px solid #fecaca;
  color:#991b1b;
}
/* responsive */
@media(max-width:900px){
  .app-shell{flex-direction:column;}
  .sidebar{width:100%;}
}
</style>
</head>

<div id="app">
  <div class="app-shell">
    <aside class="sidebar">
      <div>

    </div>
  </div>
</div>

// 顯示/隱藏 main / study

}

// render lesson
function renderLesson(chapter){
  chapterTitleEl.textContent=chapter.title;
  lessonViewEl.innerHTML='';

  // 五十音
  if(chapter.type==='kana'){
    chapter.lessons.forEach(point=>{
      const wrap=document.createElement('div');
      wrap.className='grammar-point';

      const title=document.createElement('div');
      title.className='grammar-title';
      title.textContent=point.title;

      const explain=document.createElement('div');
      explain.className='grammar-explain';
      explain.textContent=point.explain;

      wrap.appendChild(title);
      wrap.appendChild(explain);

      if(point.kanaGrid){
        const table=document.createElement('table');
        table.className='kana-table';
        const thead=document.createElement('thead');
        const hr=document.createElement('tr');
        const thCon=document.createElement('th');
        thCon.className='kana-vowel-header';
        thCon.textContent='子音';
        const thV=document.createElement('th');
        thV.className='kana-vowel-header';
        thV.colSpan=5;
        thV.textContent='母音（あ・い・う・え・お）';
        hr.appendChild(thCon);
        hr.appendChild(thV);
        thead.appendChild(hr);
        table.appendChild(thead);

        const tbody=document.createElement('tbody');
        point.kanaGrid.forEach(row=>{
          const tr=document.createElement('tr');
          const tdCon=document.createElement('td');
          tdCon.className='kana-consonant';
          tdCon.textContent=row.consonant;
          tr.appendChild(tdCon);

          const tdCells=document.createElement('td');
          tdCells.colSpan=5;
          const cellWrap=document.createElement('div');
          cellWrap.className='kana-row-cells';

          const list=currentKanaVariant==='hira'?row.kana:row.kanaKata;
          for(let i=0;i<5;i++){
            const c=list[i]||'';
            const r=row.roma[i]||'';
            const cell=document.createElement('div');
            cell.className='kana-cell';
            if(c){
              const sKana=document.createElement('span');
              sKana.className='kana-char';
              sKana.textContent=c;
              const sRoma=document.createElement('span');
              sRoma.className='kana-roma';
              sRoma.textContent=r;
              cell.appendChild(sKana);
              cell.appendChild(sRoma);
            }
            cellWrap.appendChild(cell);
          }
          tdCells.appendChild(cellWrap);
          tr.appendChild(tdCells);
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        wrap.appendChild(table);
      }
      lessonViewEl.appendChild(wrap);
    });
    return;
  }

  // 文法 wrapper
  if(chapter.type==='grammar-wrapper'){
    chapter.lessons.forEach(point=>{
      const div=document.createElement('div');
      div.className='grammar-point';
      const title=document.createElement('div');
      title.className='grammar-title';
      title.textContent=point.title;
      const explain=document.createElement('div');
      explain.className='grammar-explain';
      explain.textContent=point.explain;
      div.appendChild(title);
      div.appendChild(explain);
      lessonViewEl.appendChild(div);
    });
    return;
  }

  // 文法
  if(chapter.type==='grammar'){
    chapter.lessons.forEach(point=>{
      const div=document.createElement('div');
      div.className='grammar-point';

      const title=document.createElement('div');
      title.className='grammar-title';
      title.textContent=point.title;

      const explain=document.createElement('div');
      explain.className='grammar-explain';
      explain.textContent=point.explain;

      div.appendChild(title);
      div.appendChild(explain);

      if(point.examples){
        const ul=document.createElement('ul');
        ul.className='example-list';
        point.examples.forEach(ex=>{
          const li=document.createElement('li');
          const ja=document.createElement('div');
          ja.className='example-ja';
          if(ex.rubyHtml) ja.innerHTML=ex.rubyHtml;
          else if(ex.ja) ja.textContent=ex.ja;
          const zh=document.createElement('div');
          zh.className='example-zh';
          zh.textContent='→ '+ex.zh;
          li.appendChild(ja);
          li.appendChild(zh);
          ul.appendChild(li);
        });
        div.appendChild(ul);
      }

      if(point.vocab){
        const table=document.createElement('table');
        table.className='vocab-table';
        const thead=document.createElement('thead');
        thead.innerHTML='<tr><th>漢字</th><th>假名</th><th>中文</th></tr>';
        table.appendChild(thead);
        const tbody=document.createElement('tbody');
        point.vocab.forEach(w=>{
          const tr=document.createElement('tr');
          tr.innerHTML=`<td>${w.kanji||''}</td><td>${w.hira||''}</td><td>${w.zh||''}</td>`;
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        div.appendChild(table);
      }

      lessonViewEl.appendChild(div);
    });
    return;
  }

  // N5 單字（多個色塊 + 表格）
  if(chapter.type==='vocab'){
    chapter.lessons.forEach(point=>{
      const div=document.createElement('div');
      div.className='grammar-point';

      const bar=document.createElement('div');
      bar.className='vocab-section-bar';
      const title=document.createElement('div');
      title.className='vocab-section-title';
      title.textContent=point.title;
      const desc=document.createElement('div');
      desc.className='vocab-section-desc';
      desc.textContent=point.explain;
      bar.appendChild(title);
      bar.appendChild(desc);
      div.appendChild(bar);

      if(point.vocab){
        const table=document.createElement('table');
        table.className='vocab-table';
        const thead=document.createElement('thead');
        thead.innerHTML='<tr><th>漢字</th><th>假名</th><th>中文</th></tr>';
        table.appendChild(thead);
        const tbody=document.createElement('tbody');
        point.vocab.forEach(w=>{
          const tr=document.createElement('tr');
          tr.innerHTML=`<td>${w.kanji||''}</td><td>${w.hira||''}</td><td>${w.zh||''}</td>`;
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        div.appendChild(table);
      }

      lessonViewEl.appendChild(div);
    });
  }
}

// quiz render / grade
function renderQuiz(chapter){
  quizViewEl.innerHTML='';

  if(chapter.type==='vocab' || chapter.type==='grammar-wrapper'){
    const info=document.createElement('div');
    info.textContent='此章節暫無測驗。';
    quizViewEl.appendChild(info);
    return;
  }

  chapter.quiz.forEach((q,index)=>{
    const div=document.createElement('div');
    div.className='quiz-question';
    const p=document.createElement('p');
    p.textContent=`Q${index+1}. ${q.question}`;
    div.appendChild(p);

    if(q.type==='mc'){
      const opts=document.createElement('div');
      opts.className='options';
      q.options.forEach(opt=>{
        const label=document.createElement('label');
        label.className='option-label';
        const input=document.createElement('input');
        input.type='radio';
        input.name=`q${index}`;
        input.value=opt;
        label.appendChild(input);
        label.appendChild(document.createTextNode(' '+opt));
        opts.appendChild(label);
      });
      div.appendChild(opts);
    }else{
      const input=document.createElement('input');
      input.type='text';
      input.name=`q${index}`;
      input.placeholder='請輸入答案（可用日文）';
      div.appendChild(input);
    }
    quizViewEl.appendChild(div);
  });

  const btn=document.createElement('button');
  btn.id='submit-quiz';
  btn.textContent='交卷並查看結果';
  btn.onclick=()=>gradeQuiz(chapter);
  const result=document.createElement('div');
  result.id='quiz-result';
  quizViewEl.appendChild(btn);
  quizViewEl.appendChild(result);
}

function gradeQuiz(chapter){
  let score=0;
  const total=chapter.quiz.length;
  const wrong=[];

  const normalize=s=>(s||'').replace(/[。．！？!?\u3000\s]/g,'').trim();

  function diffHint(user,correct){
    if(!user) return '你尚未作答，可以再試一次。';
    const u=user,c=correct;
    const len=Math.max(u.length,c.length);
    for(let i=0;i<len;i++){
      const uc=u[i]||'',cc=c[i]||'';
      if(uc!==cc){
        if(!uc&&cc) return `答案後面少了「${cc}」。`;
        if(uc&&!cc) return `你多寫了後面這一段：「${u.slice(i)}」。`;
        return `這個位置你寫成「${uc}」，正確應為「${cc}」。`;
      }
    }
    return '大致正確，可能只是標點或空格不同。';
  }

  chapter.quiz.forEach((q,index)=>{
    if(q.type==='mc'){
      const selected=document.querySelector(`input[name="q${index}"]:checked`);
      const val=selected?selected.value:'';
      if(val===q.answer) score++;
      else wrong.push({index,user:val||'（未作答）',q});
    }else{
      const input=document.querySelector(`input[name="q${index}"]`);
      const raw=input.value||'';
      const normUser=normalize(raw);
      const answers=Array.isArray(q.answer)?q.answer:[q.answer];
      const ok=answers.map(a=>normalize(a)).some(a=>a===normUser);
      if(ok) score++;
      else wrong.push({index,user:raw||'（未作答）',q});
    }
  });

  const result=document.getElementById('quiz-result');
  result.innerHTML='';
  const summary=document.createElement('div');
  summary.textContent=`分數：${score} / ${total}`;
  result.appendChild(summary);

  if(wrong.length===0){
    const ok=document.createElement('div');
    ok.textContent='全部答對！做得很好！';
    result.appendChild(ok);
    return;
  }

  wrong.forEach(item=>{
    const wd=document.createElement('div');
    wd.className='wrong-detail';
    const firstAns=Array.isArray(item.q.answer)?item.q.answer[0]:item.q.answer;
    let extra='';
    if(item.q.type==='input'){
      extra=diffHint(item.user==='（未作答）'?'':item.user,firstAns);
    }
    wd.innerHTML=
      `Q${item.index+1} 回答：${item.user}<br>`+
      `正確答案：${Array.isArray(item.q.answer)?item.q.answer.join(' ／ '):item.q.answer}<br>`+
      `解說：${item.q.explanation}`+
      (extra?`<br><strong>提示：</strong>${extra}`:'');
    result.appendChild(wd);
  });
}

// view / chapter list
function switchView(view){
  if(view==='lesson'){
    lessonViewEl.classList.add('active');
    quizViewEl.classList.remove('active');
    lessonViewBtn.classList.add('active');
    quizViewBtn.classList.remove('active');
  }else{
    lessonViewEl.classList.remove('active');
    quizViewEl.classList.add('active');
    lessonViewBtn.classList.remove('active');
    quizViewBtn.classList.add('active');
  }
}
lessonViewBtn.onclick=()=>switchView('lesson');
quizViewBtn.onclick=()=>switchView('quiz');

function renderChapterButtons(){
  chapterListEl.innerHTML='';
  const list=getCurrentList();
  list.forEach((ch,idx)=>{
    const btn=document.createElement('button');
    btn.className='chapter-button'+(idx===currentChapterIndex?' active':'');
    const parts=ch.title.split('：');
    const main=parts[0]||ch.title;
    const sub=parts[1]||'';
    btn.innerHTML=`<span class="main">${main}</span>`+(sub?`<span class="sub">${sub}</span>`:'');
    btn.onclick=()=>{
      currentChapterIndex=idx;
      const listNow=getCurrentList();
      renderLesson(listNow[currentChapterIndex]);
      renderQuiz(listNow[currentChapterIndex]);
      renderChapterButtons();
      switchView('lesson');
    };
    chapterListEl.appendChild(btn);
  });
}

  studyModeLabelEl.textContent='五十音模式';
  const list=getCurrentList();
  renderChapterButtons();
  renderLesson(list[currentChapterIndex]);
  renderQuiz(list[currentChapterIndex]);

}
